services:
  db:
    image: postgres:17
    container_name: onesqlx_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onesqlx_dev
    ports:
      - "5432:5432"
    volumes:
      - onesqlx_pg_data:/var/lib/postgresql/data

volumes:
  onesqlx_pg_data: