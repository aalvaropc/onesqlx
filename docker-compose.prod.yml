services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onesqlx_app
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/onesqlx_prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE with mix phx.gen.secret}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    container_name: onesqlx_prod_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onesqlx_prod
    volumes:
      - onesqlx_prod_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  onesqlx_prod_pg_data:
